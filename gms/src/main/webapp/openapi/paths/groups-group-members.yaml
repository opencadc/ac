parameters:
  - $ref: ../components.yaml#/components/parameters/groupID
  - name: groupID2
    in: path
    required: true
    description: The name of the group to add/remove as a member. Only the group owner or administrators can
      add/remove group members.
    schema:
      type: string

put:
  summary: Add group member
  description: Add a group as a member of another group. Only internal groups can be added as members.
  operationId: addGroupMember
  tags:
    - Group Management
  responses:
    '200':
      description: Group member added successfully
    '400':
      $ref: ../components.yaml#/components/responses/BadRequest
    '401':
      $ref: ../components.yaml#/components/responses/Unauthorized
    '403':
      $ref: ../components.yaml#/components/responses/Forbidden
    '404':
      description: One or both groups could not be found
    '500':
      $ref: ../components.yaml#/components/responses/InternalServerError
    '503':
      $ref: ../components.yaml#/components/responses/ServiceUnavailable

delete:
  summary: Remove group member
  description: Remove a group as a member of another group. Only the group owner or administrators can remove
    group members.
  operationId: removeGroupMember
  tags:
    - Group Management
  responses:
    '200':
      description: Group member removed successfully
