get:
  summary: List all groups
  description: Lists the names of all the groups in the service
  operationId: listGroups
  tags:
    - Group Management
  responses:
    '200':
      description: Successful response with list of group names
      content:
        text/plain:
          schema:
            type: string
            description: Newline-separated list of group names
            example: |
              group1
              group2
    '401':
      $ref: ../components.yaml#/components/responses/Unauthorized
    '500':
      $ref: ../components.yaml#/components/responses/InternalServerError
    '503':
      $ref: ../components.yaml#/components/responses/ServiceUnavailable

put:
  summary: Create group
  description: Create a new group according to the group XML or JSON document in the HTTP PUT
  operationId: createGroup
  tags:
    - Group Management
  requestBody:
    description: Group data in XML or JSON format
    required: true
    content:
      application/xml:
        schema:
          $ref: ../components.yaml#/components/schemas/Group
      application/json:
        schema:
          $ref: ../components.yaml#/components/schemas/Group
  responses:
    '200':
      description: Group created successfully
    '400':
      $ref: ../components.yaml#/components/responses/BadRequest
    '401':
      $ref: ../components.yaml#/components/responses/Unauthorized
    '404':
      description: A member is not recognized
    '409':
      description: A group with the same name already exists
    '500':
      $ref: ../components.yaml#/components/responses/InternalServerError
    '503':
      $ref: ../components.yaml#/components/responses/ServiceUnavailable

post:
  summary: Register external group
  description: Register an external group that exists with one of the configured peer GMS services.
  operationId: registerExtGroup
  tags:
    - Group Management
  parameters:
    - name: uri
      in: query
      required: true
      description: The full URI of the external group to register
      schema:
        type: string
  responses:
    '201':
      description: External group created successfully
    '400':
      $ref: ../components.yaml#/components/responses/BadRequest
    '401':
      $ref: ../components.yaml#/components/responses/Unauthorized
    '409':
      description: An external group with the same name already exists
    '500':
      $ref: ../components.yaml#/components/responses/InternalServerError
    '503':
      $ref: ../components.yaml#/components/responses/ServiceUnavailable
